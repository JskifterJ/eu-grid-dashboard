services:
  - type: web
    name: eu-grid-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENTSO_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
