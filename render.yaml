services:
  - type: web
    name: eu-grid-dashboard
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENTSO_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
